/* ========================= HELPERS ========================= */
function fmtMoney(n){ return '$' + n.toLocaleString('en-US'); }
function fmtDate(d){ return new Date(d).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }); }
function fmtDateTime(d){ return new Date(d).toLocaleString('en-US', { month:'short', day:'numeric', hour:'numeric', minute:'2-digit' }); }
function tenantById(id){ return TENANTS.find(t => t.id === id); }
function findingsFor(tenantId){ return FINDINGS.filter(f => f.tenantId === tenantId); }

function sevBadge(sev){
  const map = {
    critical: 'bg-dangerTint text-danger',
    high: 'bg-amberTint text-[#B5740C]',
    medium: 'bg-tealTint text-teal',
    low: 'bg-navyTint text-textMuted',
  };
  return `<span class="badge ${map[sev]}">${sev[0].toUpperCase()+sev.slice(1)}</span>`;
}
function statusBadge(status){
  const map = {
    open: 'bg-dangerTint text-danger',
    remediating: 'bg-amberTint text-[#B5740C]',
    resolved: 'bg-successTint text-success',
  };
  const label = { open:'Open', remediating:'Remediating', resolved:'Resolved' }[status];
  return `<span class="badge ${map[status]}">${label}</span>`;
}
function slaBadge(s){
  const map = {
    on_track: ['bg-successTint text-success', 'On Track'],
    at_risk: ['bg-amberTint text-[#B5740C]', 'At Risk'],
    breached: ['bg-dangerTint text-danger', 'Breached'],
  };
  return `<span class="badge ${map[s][0]}">${map[s][1]}</span>`;
}
function modeBadge(mode){
  return mode === 'enforce'
    ? `<span class="badge bg-teal/10 text-teal"><i data-lucide="zap" style="width:11px;height:11px"></i>Enforce</span>`
    : `<span class="badge bg-navyTint text-navy"><i data-lucide="eye" style="width:11px;height:11px"></i>Learn</span>`;
}
function confBadge(c){
  const map = { High:'bg-successTint text-success', Medium:'bg-amberTint text-[#B5740C]', Low:'bg-dangerTint text-danger' };
  return `<span class="badge ${map[c]}">${c} confidence</span>`;
}
function reviewBadge(r){
  return r === 'Confirmed'
    ? `<span class="badge bg-successTint text-success"><i data-lucide="check" style="width:11px;height:11px"></i>Confirmed</span>`
    : `<span class="badge bg-amberTint text-[#B5740C]"><i data-lucide="clock" style="width:11px;height:11px"></i>Pending review</span>`;
}
function severityCounts(t){
  return [
    {label:'Critical', n:t.findings.critical, cls:'text-danger'},
    {label:'High', n:t.findings.high, cls:'text-[#B5740C]'},
    {label:'Medium', n:t.findings.medium, cls:'text-teal'},
    {label:'Low', n:t.findings.low, cls:'text-textMuted'},
  ];
}
function kpiCard(icon, label, value, sub, accent){
  const iconColor = accent === 'bg-amber' ? 'text-navy' : 'text-white';
  return `
  <div class="card p-5 flex items-start gap-4">
    <div class="icon-circle w-11 h-11 ${accent}"><i data-lucide="${icon}" style="width:20px;height:20px" class="${iconColor}"></i></div>
    <div>
      <div class="text-2xl font-bold text-navy leading-tight">${value}</div>
      <div class="text-[13px] text-textMuted mt-0.5">${label}</div>
      ${sub ? `<div class="text-[12px] text-textMuted mt-1">${sub}</div>` : ''}
    </div>
  </div>`;
}
function sectionHeader(title, desc){
  return `<div class="mb-5"><h2 class="text-[15px] font-bold text-navy">${title}</h2>${desc ? `<p class="text-[13px] text-textMuted mt-0.5">${desc}</p>` : ''}</div>`;
}

/* ========================= PAGE: OVERVIEW ========================= */
function renderOverview(){
  const totalCrit = TENANTS.reduce((a,t)=>a+t.findings.critical,0);
  const totalHigh = TENANTS.reduce((a,t)=>a+t.findings.high,0);
  const avgEnforce = Math.round(TENANTS.reduce((a,t)=>a+t.enforcePct,0)/TENANTS.length);
  const mrr = TENANTS.reduce((a,t)=>a+t.mrr,0);
  const slaCompliance = Math.round(100 * (TENANTS.length - TENANTS.filter(t=>t.slaStatus==='breached').length) / TENANTS.length);

  return `
  <div class="fade-in space-y-6">
    <div class="grid grid-cols-4 gap-5">
      ${kpiCard('building-2','Active tenants', TENANTS.length, `${TENANTS.reduce((a,t)=>a+t.accounts,0)} client AWS accounts under management`, 'bg-navy')}
      ${kpiCard('alert-triangle','Open critical + high findings', totalCrit+totalHigh, `${totalCrit} critical · ${totalHigh} high`, 'bg-danger')}
      ${kpiCard('gauge','SLA compliance', slaCompliance+'%', '1 tenant currently in breach', 'bg-teal')}
      ${kpiCard('dollar-sign','MRR under management', fmtMoney(mrr), `Avg. enforce-mode coverage ${avgEnforce}%`, 'bg-amber')}
    </div>

    <div class="grid grid-cols-3 gap-5">
      <div class="card p-5 col-span-2">
        ${sectionHeader('Open findings by tenant', 'Severity breakdown across all client AWS Organizations')}
        <div style="height:230px"><canvas id="chart-findings"></canvas></div>
      </div>
      <div class="card p-5">
        ${sectionHeader('SLA compliance trend', 'Last 6 months, all tenants blended')}
        <div style="height:230px"><canvas id="chart-sla"></canvas></div>
      </div>
    </div>

    <div class="card p-5">
      ${sectionHeader('Recent activity')}
      <div class="space-y-3">
        ${ACTIVITY_FEED.map(a => `
          <div class="flex items-start gap-3 pb-3 border-b border-gray-100 last:border-0 last:pb-0">
            <div class="icon-circle w-7 h-7 mt-0.5 ${activityColor(a.type)}"><i data-lucide="${activityIcon(a.type)}" style="width:13px;height:13px" class="${a.type==='drift' ? 'text-navy' : 'text-white'}"></i></div>
            <div class="flex-1 text-[13px] text-textDark leading-snug">${a.text}</div>
            <div class="text-[12px] text-textMuted shrink-0 pt-0.5">${a.time}</div>
          </div>
        `).join('')}
      </div>
    </div>
  </div>`;
}

/* ========================= PAGE: CONTROL MAPPING ========================= */
function renderMapping(){
  const frameworks = Object.keys(CONTROL_CATALOG);
  const tenantsForFramework = TENANTS.filter(t => t.frameworks.includes(state.complyFramework));
  const activeTenant = state.complyTenant === 'all' ? null : tenantById(state.complyTenant);
  const relevantTenants = activeTenant ? [activeTenant] : tenantsForFramework;

  const rows = [];
  CONTROL_CATALOG[state.complyFramework].forEach((c, idx) => {
    relevantTenants.forEach(t => {
      const mapped = findingsFor(t.id).filter(f => f.control === c.id);
      if (mapped.length === 0 && relevantTenants.length > 1) return;
      const confidence = mapped.length === 0 ? 'High' : (idx % 3 === 0 ? 'Medium' : 'High');
      const review = mapped.length > 0 && idx % 2 === 0 ? 'Pending Review' : 'Confirmed';
      rows.push({ control:c, tenant:t, mapped, confidence, review });
    });
  });

  return `
  <div class="fade-in space-y-5">
    <div class="card p-4 flex items-center gap-4">
      <div class="text-[13px] font-medium text-textMuted">Framework</div>
      <select id="sel-framework" class="border border-gray-200 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal/30">
        ${frameworks.map(f=>`<option value="${f}" ${f===state.complyFramework?'selected':''}>${f}</option>`).join('')}
      </select>
      <div class="text-[13px] font-medium text-textMuted ml-4">Tenant</div>
      <select id="sel-tenant" class="border border-gray-200 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal/30">
        <option value="all" ${state.complyTenant==='all'?'selected':''}>All tenants on this framework</option>
        ${tenantsForFramework.map(t=>`<option value="${t.id}" ${state.complyTenant===t.id?'selected':''}>${t.name}</option>`).join('')}
      </select>
    </div>

    <div class="card p-5">
      ${sectionHeader(`${state.complyFramework} control coverage`, `Bedrock-assisted mapping of findings to controls, with human reviewer sign-off`)}
      <table class="dtable w-full">
        <thead><tr><th>Control</th><th>Description</th><th>Tenant</th><th>Mapped findings</th><th>Confidence</th><th>Review status</th></tr></thead>
        <tbody>
          ${rows.map(r=>`
            <tr>
              <td><span class="badge bg-tealTint text-teal">${r.control.id}</span></td>
              <td class="text-textMuted max-w-sm">${r.control.desc}</td>
              <td class="font-medium text-navy">${r.tenant.name}</td>
              <td>${r.mapped.length ? `<span class="font-semibold text-navy">${r.mapped.length}</span> finding${r.mapped.length>1?'s':''}` : '<span class="text-textMuted">Satisfied — none open</span>'}</td>
              <td>${r.mapped.length ? confBadge(r.confidence) : '<span class="text-textMuted text-[12px]">—</span>'}</td>
              <td>${r.mapped.length ? reviewBadge(r.review) : '<span class="text-textMuted text-[12px]">—</span>'}</td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>
  </div>`;
}

function renderEvidence(){
  return `

      <p class="text-[13px] text-textMuted max-w-2xl">Evidence packages are immutable once generated — written once to S3 with Object Lock and unable to be altered or deleted by anyone, including Veriguard operators, until the retention period expires.</p>

        <tbody id="evidence-tbody">
          ${EVIDENCE_PACKAGES.map(p=>renderEvidenceRow(p)).join('')}

function renderEvidenceRow(p){
  const locked = p.status === 'Locked';
  return `<tr id="row-${p.id}">
    <td class="font-mono text-[13px] font-semibold text-navy">${p.id}</td>
    <td class="font-medium text-navy">${tenantById(p.tenant).name}</td>
    <td><span class="badge bg-navyTint text-navy">${p.framework}</span></td>
    <td class="text-textMuted text-[12px]">${fmtDate(p.start)} – ${fmtDate(p.end)}</td>
    <td class="text-textMuted text-[12px]">${fmtDate(p.generated)}</td>
    <td>${p.findings}</td>
    <td class="text-textMuted">${p.size}</td>
    <td>${locked
      ? `<span class="badge bg-successTint text-success"><i data-lucide="lock" style="width:11px;height:11px"></i>Locked</span>`
      : `<span class="badge bg-amberTint text-[#B5740C]"><i data-lucide="loader" style="width:11px;height:11px"></i>Generating…</span>`}</td>
    <td>${locked ? `<button class="text-teal text-[13px] font-medium hover:underline flex items-center gap-1"><i data-lucide="download" style="width:13px;height:13px"></i>Export</button>` : ''}</td>
  </tr>`;
}

/* ========================= EVIDENCE MODAL ========================= */
function openEvidenceModal(){
  const frameworks = Object.keys(CONTROL_CATALOG);
  document.getElementById('modal-root').innerHTML = `
    <div id="modal-backdrop" class="fixed inset-0 modal-backdrop flex items-center justify-center z-50 fade-in">
      <div class="bg-white rounded-2xl w-full max-w-md p-6 shadow-xl">
        <h3 class="text-[16px] font-bold text-navy mb-1">Generate evidence package</h3>
        <p class="text-[13px] text-textMuted mb-5">Findings, control mappings, and remediation proof will be packaged and written once to S3 with Object Lock.</p>
        <div class="space-y-3">
          <div>
            <label class="text-[12px] font-semibold text-textMuted">Tenant</label>
            <select id="modal-tenant" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm mt-1">${TENANTS.map(t=>`<option value="${t.id}">${t.name}</option>`).join('')}</select>
          </div>
          <div>
            <label class="text-[12px] font-semibold text-textMuted">Framework</label>
            <select id="modal-framework" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm mt-1">${frameworks.map(f=>`<option value="${f}">${f}</option>`).join('')}</select>
          </div>
          <div>
            <label class="text-[12px] font-semibold text-textMuted">Period</label>
            <div class="flex gap-2 mt-1">
              <input type="date" id="modal-start" value="2026-04-01" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm" />
              <input type="date" id="modal-end" value="2026-06-30" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm" />
            </div>
          </div>
        </div>
        <div class="flex gap-3 mt-6">
          <button id="modal-cancel" class="flex-1 border border-gray-200 rounded-lg py-2.5 text-sm font-semibold text-textMuted hover:bg-gray-50">Cancel</button>
          <button id="modal-confirm" class="flex-1 bg-teal text-white rounded-lg py-2.5 text-sm font-semibold hover:bg-teal/90">Generate</button>
        </div>
      </div>
    </div>`;
  document.getElementById('modal-cancel').onclick = closeModal;
  document.getElementById('modal-backdrop').addEventListener('click', e => { if (e.target.id === 'modal-backdrop') closeModal(); });
  document.getElementById('modal-confirm').onclick = () => {
    const tenant = document.getElementById('modal-tenant').value;
    const framework = document.getElementById('modal-framework').value;
    const start = document.getElementById('modal-start').value;
    const end = document.getElementById('modal-end').value;
    const id = 'EP-' + (1043 + EVIDENCE_PACKAGES.length);
    const pkg = { id, tenant, framework, start, end, generated:'2026-06-30', findings: Math.floor(Math.random()*30)+10, status:'Generating', size:'—' };
    EVIDENCE_PACKAGES.unshift(pkg);
    closeModal();
    render();
    setTimeout(() => {
      pkg.status = 'Locked';
      pkg.size = (Math.random()*4+1).toFixed(1) + ' MB';
      const row = document.getElementById('row-' + id);
      if (row) row.outerHTML = renderEvidenceRow(pkg);
      lucide.createIcons();
    }, 2200);
  };
}
function closeModal(){ document.getElementById('modal-root').innerHTML = ''; }

/* ========================= ROUTING / RENDER ========================= */
const PAGE_META = {
  overview: ['Overview', 'Cross-tenant security posture at a glance'],
  tenants: ['Tenants', 'Client AWS Organizations onboarded to Veriguard'],
  sla: ['SLA & Billing', 'Contractual targets, breaches, and usage-based billing'],
  mapping: ['Control Mapping', 'Findings mapped to compliance framework controls'],
  evidence: ['Evidence Packages', 'Immutable, audit-ready exports for auditors'],
  drift: ['Posture Drift', 'Controls that have regressed since last satisfied'],
  tenantDetail: ['Tenant detail', ''],
};

function render(){
  const content = document.getElementById('page-content');
  let meta = PAGE_META[state.page];
  if (state.page === 'tenantDetail') {
    const t = tenantById(state.tenantId);
    meta = ['Tenant detail', t ? t.name : ''];
    content.innerHTML = renderTenantDetail(state.tenantId);
  } else {
    const renderers = { overview:renderOverview, tenants:renderTenants, sla:renderSla, mapping:renderMapping, evidence:renderEvidence, drift:renderDrift };
    content.innerHTML = renderers[state.page]();
  }
  document.getElementById('page-title').textContent = meta[0];
  document.getElementById('page-subtitle').textContent = meta[1];

  document.querySelectorAll('.nav-item').forEach(el => {
    const navKey = el.getAttribute('data-nav');
    const isActive = navKey === state.page || (state.page === 'tenantDetail' && navKey === 'tenants');
    el.classList.toggle('active', isActive);
  });

  if (window.lucide) lucide.createIcons();
  if (state.page === 'overview') initOverviewCharts();
  wirePageEvents();
}

function wirePageEvents(){
  document.querySelectorAll('[data-open-tenant]').forEach(el => {
    el.addEventListener('click', () => { state.page = 'tenantDetail'; state.tenantId = el.getAttribute('data-open-tenant'); render(); });
  });
  const fSel = document.getElementById('sel-framework');
  if (fSel) fSel.addEventListener('change', e => { state.complyFramework = e.target.value; state.complyTenant = 'all'; render(); });
  const tSel = document.getElementById('sel-tenant');
  if (tSel) tSel.addEventListener('change', e => { state.complyTenant = e.target.value; render(); });
  const genBtn = document.getElementById('btn-generate-evidence');
  if (genBtn) genBtn.addEventListener('click', openEvidenceModal);
}

document.querySelectorAll('[data-nav]').forEach(el => {
  el.addEventListener('click', () => { state.page = el.getAttribute('data-nav'); state.tenantId = null; render(); });
});

render();
</script>
